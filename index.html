<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>卡路里管家</title>
<meta name="theme-color" content="#0f1115">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="卡路里">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <header class="app-header">
    <div class="header-titles">
      <h1>卡路里管家</h1>
      <p class="today-date" id="todayDate"></p>
    </div>
    <button class="pill-btn" id="openLibraryBtn">🍱 食物库</button>
  </header>

  <section class="ring-section">
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 220 220">
        <defs>
          <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#22d3ee"/>
            <stop offset="100%" stop-color="#6366f1"/>
          </linearGradient>
          <linearGradient id="ringGradientOver" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f97316"/>
            <stop offset="100%" stop-color="#ef4444"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="110" cy="110" r="95"></circle>
        <circle class="ring-fg" id="ringFg" cx="110" cy="110" r="95"></circle>
      </svg>
      <div class="ring-center">
        <div class="ring-remaining" id="ringRemaining">2000</div>
        <div class="ring-label" id="ringLabel">剩余 kcal</div>
        <div class="ring-sub" id="ringSub">已摄入 0 / 2000 kcal</div>
      </div>
    </div>
    <div class="macros-row">
      <div class="macro-chip">
        <span class="macro-dot protein"></span>
        <div>
          <div class="macro-val" id="macroP">0 g</div>
          <div class="macro-name">蛋白质</div>
        </div>
      </div>
      <div class="macro-chip">
        <span class="macro-dot carbs"></span>
        <div>
          <div class="macro-val" id="macroC">0 g</div>
          <div class="macro-name">碳水</div>
        </div>
      </div>
      <div class="macro-chip">
        <span class="macro-dot fat"></span>
        <div>
          <div class="macro-val" id="macroF">0 g</div>
          <div class="macro-name">脂肪</div>
        </div>
      </div>
    </div>
    <button class="link-btn" id="editLimitBtn">设置每日上限 →</button>
  </section>

  <section class="meals-section">
    <div class="section-title">
      <h2>今日餐次</h2>
      <button class="add-btn" id="addMealBtn">+ 添加餐次</button>
    </div>
    <div class="meals-grid" id="mealsGrid"></div>
  </section>

</div>

<!-- Daily limit modal -->
<div class="modal-overlay" id="limitModalOverlay">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h3>每日卡路里上限</h3>
      <button class="close-btn" data-close="limitModalOverlay">✕</button>
    </div>
    <div class="modal-body">
      <label class="field-label">每日上限 (kcal)</label>
      <input type="number" id="dailyLimitInput" class="text-input" min="0" step="10" placeholder="例如 2000">
      <div class="modal-actions">
        <button class="primary-btn" id="saveLimitBtn">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- Add meal modal -->
<div class="modal-overlay" id="addMealModalOverlay">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h3>添加餐次</h3>
      <button class="close-btn" data-close="addMealModalOverlay">✕</button>
    </div>
    <div class="modal-body">
      <label class="field-label">餐次名称</label>
      <input type="text" id="newMealName" class="text-input" placeholder="例如 加餐 / 夜宵">
      <label class="field-label">卡路里限制 (kcal)</label>
      <input type="number" id="newMealLimit" class="text-input" min="0" step="10" placeholder="例如 400">
      <div class="modal-actions">
        <button class="primary-btn" id="createMealBtn">创建</button>
      </div>
    </div>
  </div>
</div>

<!-- Meal detail modal -->
<div class="modal-overlay" id="mealModalOverlay">
  <div class="modal modal-lg">
    <div class="modal-header">
      <input type="text" id="mealNameInput" class="meal-title-input" />
      <button class="close-btn" data-close="mealModalOverlay">✕</button>
    </div>
    <div class="modal-body">
      <div class="meal-limit-row">
        <label class="field-label">这餐的卡路里限制</label>
        <div class="meal-limit-input-wrap">
          <input type="number" id="mealLimitInput" class="text-input text-input-inline" min="0" step="10">
          <span class="unit-text">kcal</span>
        </div>
      </div>

      <div class="food-items-list" id="foodItemsList"></div>

      <button class="add-btn add-food-btn" id="addFoodItemBtn">+ 添加食物</button>

      <div class="meal-summary" id="mealSummary"></div>

      <div class="modal-actions modal-actions-split">
        <button class="danger-link-btn" id="deleteMealBtn">删除该餐次</button>
      </div>
    </div>
  </div>
</div>

<!-- Food library modal -->
<div class="modal-overlay" id="libraryModalOverlay">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3>食物库</h3>
      <button class="close-btn" data-close="libraryModalOverlay">✕</button>
    </div>
    <div class="modal-body">
      <div class="library-list" id="libraryList"></div>

      <div class="add-food-form">
        <h4>自定义食物</h4>
        <div class="add-food-row">
          <select id="newFoodEmoji" class="emoji-select">
            <option value="🍽️">🍽️</option>
            <option value="🥗">🥗</option>
            <option value="🍜">🍜</option>
            <option value="🍕">🍕</option>
            <option value="🍦">🍦</option>
            <option value="🧋">🧋</option>
            <option value="🥜">🥜</option>
            <option value="🍇">🍇</option>
            <option value="🍪">🍪</option>
            <option value="🍓">🍓</option>
          </select>
          <input type="text" id="newFoodName" class="text-input" placeholder="食物名称，例如 藜麦">
          <input type="number" id="newFoodCal" class="text-input" placeholder="每克卡路里 kcal/g" min="0" step="0.01">
        </div>
        <div class="add-food-row">
          <input type="number" id="newFoodP" class="text-input" placeholder="蛋白质 g/100g" min="0" step="0.1">
          <input type="number" id="newFoodC" class="text-input" placeholder="碳水 g/100g" min="0" step="0.1">
          <input type="number" id="newFoodF" class="text-input" placeholder="脂肪 g/100g" min="0" step="0.1">
        </div>
        <p class="hint-text">提示：如果你只知道每 100 克的卡路里，除以 100 即可得到每克卡路里。宏量按每 100 克填写，不填默认为 0。</p>
        <button class="primary-btn" id="addFoodBtn">添加到食物库</button>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
// file:// 下无法注册 service worker，直接双击打开时跳过
if ("serviceWorker" in navigator && location.protocol.indexOf("http") === 0) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("sw.js");
  });
}
</script>
</body>
</html>
